<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 20px; }
    nav a { margin-left: 15px; text-decoration: none; color: #0076ff; }
    footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 0.9em; color: #666; }
    .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .project-card { border: 1px solid #ddd; padding: 15px; border-radius: 5px; }
    .post-time { color: #888; font-size: 0.9em; }
    .project-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;  margin-top: 20px;}
    @media (max-width: 768px) {.project-grid-3 { grid-template-columns: 1fr; }}
  </style>
</head>
<body>

  <header>
    <h1><a href="/" style="text-decoration: none; color: inherit;">{{ site.title }}</a></h1>
    <nav>
      <a href="/">Portfolio</a>
      <a href="/banners.html">Banners</a>
      <a href="/blog.html">Blog</a>
      <a href="/about.html">About</a>
    </nav>
  </header>

  <main style="margin-top: 30px;">
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ "now" | date: "%Y" }} {{ site.title }}. Built with Jekyll.</p>
  </footer>

</body>
</html>
